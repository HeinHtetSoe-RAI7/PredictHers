<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menstrual Cycle Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- <style>
        /* Custom tweaks to match the specific React tracking-spacing if needed */
        .letter-spacing-2 {
            letter-spacing: 0.2em;
        }
    </style> -->
</head>
<body class="min-h-screen bg-gradient-to-br from-[#FFF0F5] via-[#FFF5F8] to-[#F8E8F0] flex flex-col font-sans">

    <header class="pt-10 pb-4 flex flex-col items-center">
        <div class="flex items-center gap-2 mb-1">
            <i data-lucide="flower-2" class="text-[#D4729A]" width="28" height="28" stroke-width="1.5"></i>
            <i data-lucide="heart" class="text-[#E8A0B8]" width="16" height="16" stroke-width="0" fill="#E8A0B8"></i>
        </div>
        <h1 class="text-[2.6rem] font-light tracking-tight text-[#2D1B2E] leading-tight">
            Predict
            <span class="font-semibold text-[#C4527A]">Hers</span>
        </h1>
        <p class="text-[#9B6B82] text-base tracking-widest uppercase font-medium letter-spacing-2 mt-1">
            Track & Predict Your Cycle
        </p>
    </header>

    <div class="flex justify-center mt-4 mb-12">
        <div class="flex items-center gap-3">
            <div class="w-16 h-px bg-gradient-to-r from-transparent to-[#E8A0B8]"></div>
            <div class="w-2 h-2 rounded-full bg-[#E8A0B8]"></div>
            <div class="w-2 h-2 rounded-full bg-[#F4C2D4]"></div>
            <div class="w-2 h-2 rounded-full bg-[#E8A0B8]"></div>
            <div class="w-16 h-px bg-gradient-to-l from-transparent to-[#E8A0B8]"></div>
        </div>
    </div>

    <main class="flex-1 flex flex-col items-center justify-center px-8">
        <div class="max-w-2xl w-full">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <a href="calculator" class="block group relative bg-gradient-to-br from-[#D4729A] to-[#C4527A] text-white rounded-2xl p-7 shadow-[0_8px_30px_rgba(196,82,122,0.35)] hover:shadow-[0_12px_40px_rgba(196,82,122,0.5)] transition-all duration-300 hover:-translate-y-1 active:translate-y-0 text-left overflow-hidden decoration-0">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -translate-y-12 translate-x-12 group-hover:scale-110 transition-transform duration-500"></div>
                    <div class="relative z-10">
                        <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center mb-4">
                            <i data-lucide="calendar" width="22" height="22" stroke-width="1.5"></i>
                        </div>
                        <div class="text-xl font-semibold tracking-tight leading-tight">Period</div>
                        <div class="text-xl font-semibold tracking-tight leading-tight">Calculator</div>
                        <div class="text-white/70 text-sm mt-2 font-light">Quick cycle prediction</div>
                    </div>
                </a>

                <a href="tracker" class="block group relative bg-white text-[#2D1B2E] rounded-2xl p-7 shadow-[0_8px_30px_rgba(196,82,122,0.1)] hover:shadow-[0_12px_40px_rgba(196,82,122,0.22)] border border-[#F4C2D4]/60 transition-all duration-300 hover:-translate-y-1 active:translate-y-0 text-left overflow-hidden decoration-0">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-[#FFF0F5] rounded-full -translate-y-12 translate-x-12 group-hover:scale-110 transition-transform duration-500"></div>
                    <div class="relative z-10">
                        <div class="w-12 h-12 bg-[#FFF0F5] rounded-xl flex items-center justify-center mb-4">
                            <i data-lucide="bar-chart-2" class="text-[#C4527A]" width="22" height="22" stroke-width="1.5"></i>
                        </div>
                        <div class="text-xl font-semibold tracking-tight leading-tight text-[#2D1B2E]">Personal</div>
                        <div class="text-xl font-semibold tracking-tight leading-tight text-[#2D1B2E]">Tracker</div>
                        <div class="text-[#9B6B82] text-sm mt-2 font-light">Personalised analysis</div>
                    </div>
                </a>
                
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-[#C4A0B4] text-sm font-light">
        <p>Designed for academic research & personal wellness</p>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
